name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: false
          DISABLE_ESLINT_PLUGIN: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KOSMOS Explorer ${{ github.ref_name }}'
          releaseBody: 'Desktop-Client für OpenCloud'
          releaseDraft: false
          prerelease: false

  codeberg-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir artifacts \
            --pattern '*'

      - name: Create Codeberg release
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Create release
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://codeberg.org/api/v1/repos/kosmos-lab/kosmos-explorer/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"KOSMOS Explorer ${TAG}\",\"body\":\"Desktop-Client für OpenCloud\",\"draft\":false,\"prerelease\":false}" \
            | jq -r '.id')

          echo "Created Codeberg release ID: ${RELEASE_ID}"

          # Upload each artifact
          for file in artifacts/*; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            echo "Uploading ${filename}..."
            curl -s -X POST \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@${file}" \
              "https://codeberg.org/api/v1/repos/kosmos-lab/kosmos-explorer/releases/${RELEASE_ID}/assets?name=${filename}"
          done

          echo "Codeberg release: https://codeberg.org/kosmos-lab/kosmos-explorer/releases/tag/${TAG}"
